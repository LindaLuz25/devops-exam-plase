version: "3.8"

services:

  app-blue:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: app-blue
    ports:
      - "3001:3000"
    networks:
      - devops-net

  app-green:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: app-green
    ports:
      - "3002:3000"
    networks:
      - devops-net

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    networks:
      - devops-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - devops-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3005:3000"
    networks:
      - devops-net

networks:
  devops-net:
    external: true