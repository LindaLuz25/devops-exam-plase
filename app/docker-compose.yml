services:

  app-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-blue
    ports:
      - "3001:3000"
    networks:
      - devops-net

  app-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-green
    ports:
      - "3002:3000"
    networks:
      - devops-net

  nginx:
    image: nginx:latest
    container_name: nginx-final
    # volumes:
      # Usamos el path relativo al archivo, pero añadimos :ro para seguridad
      #- ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - devops-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus-final
    volumes:
    - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - devops-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3005:3000"
    networks:
      - devops-net

networks:
  devops-net:
    external: true