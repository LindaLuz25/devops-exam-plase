global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'app-blue'
    static_configs:
      - targets: ['app-blue:3000']

  - job_name: 'app-green'
    static_configs:
      - targets: ['app-green:3000']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']